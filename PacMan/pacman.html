<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PAC-MAN</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Press Start 2P', 'Courier New', monospace;
      color: #fff;
      overflow: hidden;
    }
    #hud {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 560px;
      padding: 8px 0;
      font-size: 14px;
      letter-spacing: 2px;
    }
    #hud span { color: #ff0; }
    #lives-container { display: flex; gap: 6px; align-items: center; }
    .life-icon { width: 18px; height: 18px; }
    canvas {
      border: 2px solid #1a1aff;
      box-shadow: 0 0 30px #1a1aff88, 0 0 60px #1a1aff44;
      display: block;
    }
    #message {
      position: absolute;
      font-size: 22px;
      color: #ff0;
      text-shadow: 0 0 10px #ff0;
      letter-spacing: 4px;
      pointer-events: none;
      text-align: center;
      display: none;
    }
    #sub-message {
      position: absolute;
      font-size: 11px;
      color: #fff;
      letter-spacing: 2px;
      pointer-events: none;
      text-align: center;
      margin-top: 40px;
      display: none;
    }
  </style>
</head>
<body>
<div id="hud">
  <div>SCORE: <span id="score-display">0</span></div>
  <div>HIGH: <span id="high-display">0</span></div>
  <div id="lives-container">LIVES: </div>
</div>
<canvas id="canvas" width="560" height="620"></canvas>
<div id="message"></div>
<div id="sub-message"></div>

<script>
// ─────────────────────────────────────────────
// MAZE DEFINITION  (28 cols × 31 rows)
// 0=empty dot, 1=wall, 2=power pellet, 3=empty no dot, 4=ghost house
// ─────────────────────────────────────────────
const TILE = 20;
const COLS = 28;
const ROWS = 31;

const RAW_MAP = [
  "1111111111111111111111111111",
  "1000000000000110000000000001",
  "1011110111110110111110111101",
  "1211110111110110111110111121",
  "1011110111110110111110111101",
  "1000000000000000000000000001",
  "1011110110111111110110111101",
  "1011110110111111110110111101",
  "1000000110000110000110000001",
  "1111110111110330111110111111",
  "1111110111110330111110111111",
  "1111110110333333333110111111",
  "1111110110344444431100111111",
  "3333330000344444430000333333",
  "1111110110344444431100111111",
  "1111110110333333333110111111",
  "1111110110033303330110111111",
  "1111110110111111110110111111",
  "1000000000000110000000000001",
  "1011110111110110111110111101",
  "1011110111110110111110111101",
  "1200000011000000001100000021",
  "1110111011110110111101110111",
  "1110111011110110111101110111",
  "1000000000000330000000000001",
  "1011111111110110111111111101",
  "1011111111110110111111111101",
  "1000000000000000000000000001",
  "1011110111111111111110111101",
  "1011110111111111111110111101",
  "1000000000000000000000000001",
].map(row => row.split('').map(Number));

// Fix map to be 31 rows
while (RAW_MAP.length < ROWS) RAW_MAP.push(new Array(COLS).fill(1));

// ─────────────────────────────────────────────
// MUSIC PLAYLIST
// ─────────────────────────────────────────────
const PLAYLIST = [
  'Arcade Rush Loop.mp3',
  'Pixel Power Loop.mp3',
];
let currentTrack = 0;
let musicAudio = null;
let musicStarted = false;

function startMusic() {
  if (musicStarted) return;
  musicStarted = true;
  playNextTrack();
}

function playNextTrack() {
  if (musicAudio) { musicAudio.pause(); musicAudio = null; }
  musicAudio = new Audio(PLAYLIST[currentTrack]);
  musicAudio.volume = 0.35;
  musicAudio.addEventListener('ended', () => {
    currentTrack = (currentTrack + 1) % PLAYLIST.length;
    playNextTrack();
  });
  musicAudio.play().catch(() => {});
}

// ─────────────────────────────────────────────
// AUDIO ENGINE
// ─────────────────────────────────────────────
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;

function ensureAudio() {
  if (!audioCtx) audioCtx = new AudioCtx();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  startMusic();
}

function playTone(freq, type, duration, vol = 0.15, startTime) {
  if (!audioCtx) return;
  const t = startTime !== undefined ? startTime : audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.type = type;
  osc.frequency.setValueAtTime(freq, t);
  gain.gain.setValueAtTime(vol, t);
  gain.gain.exponentialRampToValueAtTime(0.001, t + duration);
  osc.start(t);
  osc.stop(t + duration + 0.01);
}

function playEat() {
  ensureAudio();
  const now = audioCtx.currentTime;
  playTone(600, 'square', 0.04, 0.08, now);
  playTone(900, 'square', 0.04, 0.06, now + 0.05);
}

function playPowerPellet() {
  ensureAudio();
  const now = audioCtx.currentTime;
  for (let i = 0; i < 6; i++) {
    playTone(300 + i * 80, 'sawtooth', 0.07, 0.12, now + i * 0.07);
  }
}

function playEatGhost() {
  ensureAudio();
  const now = audioCtx.currentTime;
  [800, 600, 400, 1000].forEach((f, i) => playTone(f, 'square', 0.1, 0.2, now + i * 0.09));
}

function playDeath() {
  ensureAudio();
  const now = audioCtx.currentTime;
  for (let i = 0; i < 12; i++) {
    playTone(600 - i * 45, 'sawtooth', 0.08, 0.18, now + i * 0.07);
  }
}

function playSiren() {
  ensureAudio();
  const now = audioCtx.currentTime;
  playTone(180, 'sine', 0.12, 0.06, now);
  playTone(200, 'sine', 0.12, 0.06, now + 0.12);
}

function playLevelUp() {
  ensureAudio();
  const now = audioCtx.currentTime;
  [523, 659, 784, 1046].forEach((f, i) => playTone(f, 'triangle', 0.18, 0.2, now + i * 0.15));
}

// ─────────────────────────────────────────────
// GAME STATE
// ─────────────────────────────────────────────
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const scoreDisplay = document.getElementById('score-display');
const highDisplay = document.getElementById('high-display');
const livesContainer = document.getElementById('lives-container');
const msgEl = document.getElementById('message');
const subEl = document.getElementById('sub-message');

let map, score, highScore, lives, level, totalDots;
let gameState; // 'title','ready','playing','dying','levelclear','gameover'
let stateTimer = 0;

// Ghost colors and names
const GHOST_CONFIG = [
  { name: 'Blinky', color: '#ff0000', scatterTarget: {col:25, row:0} },
  { name: 'Pinky',  color: '#ffb8ff', scatterTarget: {col:2,  row:0} },
  { name: 'Inky',   color: '#00ffff', scatterTarget: {col:27, row:30} },
  { name: 'Clyde',  color: '#ffb852', scatterTarget: {col:0,  row:30} },
];

// Directions
const DIR = { UP:{dx:0,dy:-1}, DOWN:{dx:0,dy:1}, LEFT:{dx:-1,dy:0}, RIGHT:{dx:1,dy:0} };
const DIRS = [DIR.UP, DIR.DOWN, DIR.LEFT, DIR.RIGHT];

let pacman, ghosts;
let powerTimer = 0;
const POWER_DURATION = 8000; // ms
let eatGhostScore = 200;
let sirenTimer = 0;
let animFrame = 0;
let lastTime = 0;
let frameCount = 0;
let ghostEatQueue = []; // {score, x, y, timer}

// ─────────────────────────────────────────────
// UTILITIES
// ─────────────────────────────────────────────
function cloneMap(src) { return src.map(r => [...r]); }

function isWall(col, row) {
  if (row < 0 || row >= ROWS || col < 0 || col >= COLS) return true;
  const v = map[row][col];
  return v === 1 || v === 4;
}

function isWallForGhost(col, row) {
  if (row < 0 || row >= ROWS) return true;
  // Wrap horizontally
  col = ((col % COLS) + COLS) % COLS;
  return map[row][col] === 1;
}

function wrapCol(col) { return ((col % COLS) + COLS) % COLS; }

function tileCenter(col, row) {
  return { x: col * TILE + TILE / 2, y: row * TILE + TILE / 2 };
}

function dist(a, b) {
  return Math.sqrt((a.col - b.col) ** 2 + (a.row - b.row) ** 2);
}

// ─────────────────────────────────────────────
// PACMAN
// ─────────────────────────────────────────────
function createPacman() {
  return {
    col: 13, row: 24,
    x: 13 * TILE + TILE / 2,
    y: 24 * TILE + TILE / 2,
    dir: DIR.LEFT,
    nextDir: DIR.LEFT,
    speed: 2.0,
    mouthAngle: 0.25,
    mouthDir: 1,
    moving: false,
    dead: false,
    deathFrame: 0,
  };
}

function updatePacman(dt) {
  if (pacman.dead) return;
  const speed = pacman.speed * (level > 1 ? 1 + (level - 1) * 0.05 : 1);

  // Nearest tile center — used for turn alignment
  const nearCol = Math.round((pacman.x - TILE / 2) / TILE);
  const nearRow = Math.round((pacman.y - TILE / 2) / TILE);
  const nearCX  = nearCol * TILE + TILE / 2;
  const nearCY  = nearRow * TILE + TILE / 2;
  const turnThresh = speed + 2;

  // Attempt a turn ONLY when the desired direction actually differs
  if (pacman.nextDir !== pacman.dir) {
    if (Math.abs(pacman.x - nearCX) <= turnThresh && Math.abs(pacman.y - nearCY) <= turnThresh) {
      const tc = nearCol + pacman.nextDir.dx;
      const tr = nearRow + pacman.nextDir.dy;
      if (!isWall(wrapCol(tc), tr)) {
        pacman.dir = pacman.nextDir;
        pacman.x   = nearCX;
        pacman.y   = nearCY;
      }
    }
  }

  // Wall check: probe the leading edge of pac-man in the movement direction
  const edgeRadius = TILE / 2 - 1;
  const edgeX = pacman.x + pacman.dir.dx * edgeRadius;
  const edgeY = pacman.y + pacman.dir.dy * edgeRadius;
  const edgeC = wrapCol(Math.floor(edgeX / TILE));
  const edgeR  = Math.floor(edgeY / TILE);

  pacman.moving = false;
  if (!isWall(edgeC, edgeR)) {
    pacman.x += pacman.dir.dx * speed;
    pacman.y += pacman.dir.dy * speed;
    pacman.moving = true;
  } else {
    // Slide toward the nearest tile center so pac-man stops cleanly at the wall
    if (pacman.dir.dx !== 0)
      pacman.x += Math.sign(nearCX - pacman.x) * Math.min(speed, Math.abs(nearCX - pacman.x));
    if (pacman.dir.dy !== 0)
      pacman.y += Math.sign(nearCY - pacman.y) * Math.min(speed, Math.abs(nearCY - pacman.y));
  }

  // Wrap horizontal
  if (pacman.x < 0) pacman.x = COLS * TILE;
  if (pacman.x > COLS * TILE) pacman.x = 0;

  // Tile position
  pacman.col = Math.floor(pacman.x / TILE);
  pacman.row = Math.floor(pacman.y / TILE);
  if (pacman.col < 0) pacman.col = 0;
  if (pacman.col >= COLS) pacman.col = COLS - 1;
  if (pacman.row < 0) pacman.row = 0;
  if (pacman.row >= ROWS) pacman.row = ROWS - 1;

  // Eat dots
  const tv = map[pacman.row][pacman.col];
  if (tv === 0) {
    map[pacman.row][pacman.col] = 3;
    score += 10;
    totalDots--;
    playEat();
  } else if (tv === 2) {
    map[pacman.row][pacman.col] = 3;
    score += 50;
    totalDots--;
    powerTimer = POWER_DURATION;
    eatGhostScore = 200;
    ghosts.forEach(g => { if (g.mode !== 'house' && g.mode !== 'leaving') g.mode = 'frightened'; g.frightenedTimer = POWER_DURATION; });
    playPowerPellet();
  }

  // Animate mouth
  if (pacman.moving) {
    pacman.mouthAngle += 0.04 * pacman.mouthDir;
    if (pacman.mouthAngle > 0.28) pacman.mouthDir = -1;
    if (pacman.mouthAngle < 0.02) pacman.mouthDir = 1;
  }
}

// ─────────────────────────────────────────────
// GHOSTS
// ─────────────────────────────────────────────
function createGhosts() {
  return GHOST_CONFIG.map((cfg, i) => ({
    ...cfg,
    col: 13 + (i % 2), row: 14,
    x: (13 + (i % 2)) * TILE + TILE / 2,
    y: 14 * TILE + TILE / 2,
    dir: DIR.LEFT,
    mode: i === 0 ? 'scatter' : 'house',
    frightenedTimer: 0,
    houseTimer: i * 2500,
    speed: 1.6,
    eyeDir: DIR.LEFT,
    dotCounter: 0,
    eaten: false,
    decideCol: -1,
    decideRow: -1,
  }));
}

const GHOST_SPEED = 1.6;
const GHOST_FRIGHTENED_SPEED = 0.9;
const GHOST_EATEN_SPEED = 3.0;
const HOUSE_EXIT = { col: 14, row: 11 }; // above ghost house

function ghostTarget(ghost) {
  if (ghost.mode === 'scatter') return ghost.scatterTarget;
  if (ghost.mode === 'frightened') return null;
  if (ghost.mode === 'eaten') return HOUSE_EXIT;
  if (ghost.mode === 'house' || ghost.mode === 'leaving') return HOUSE_EXIT;
  // Chase
  const p = { col: pacman.col, row: pacman.row };
  switch (ghost.name) {
    case 'Blinky': return p;
    case 'Pinky': return { col: p.col + pacman.dir.dx * 4, row: p.row + pacman.dir.dy * 4 };
    case 'Inky': {
      const blinky = ghosts[0];
      const pivot = { col: p.col + pacman.dir.dx * 2, row: p.row + pacman.dir.dy * 2 };
      return { col: pivot.col * 2 - blinky.col, row: pivot.row * 2 - blinky.row };
    }
    case 'Clyde':
      return dist(ghost, p) > 8 ? p : ghost.scatterTarget;
    default: return p;
  }
}

function bestGhostDir(ghost, target) {
  let best = null, bestDist = Infinity;
  const opposite = { dx: -ghost.dir.dx, dy: -ghost.dir.dy };
  for (const d of DIRS) {
    if (d.dx === opposite.dx && d.dy === opposite.dy) continue;
    const nc = ghost.col + d.dx;
    const nr = ghost.row + d.dy;
    const wc = wrapCol(nc);
    if (isWallForGhost(wc, nr)) continue;
    if (ghost.mode !== 'eaten' && ghost.mode !== 'leaving' && map[nr] && map[nr][wc] === 4) continue;
    const dc = nc - target.col, dr = nr - target.row;
    const d2 = dc * dc + dr * dr;
    if (d2 < bestDist) { bestDist = d2; best = d; }
  }
  return best || ghost.dir;
}

function randomGhostDir(ghost) {
  const opposite = { dx: -ghost.dir.dx, dy: -ghost.dir.dy };
  const opts = DIRS.filter(d => {
    if (d.dx === opposite.dx && d.dy === opposite.dy) return false;
    const nc = wrapCol(ghost.col + d.dx);
    const nr = ghost.row + d.dy;
    if (isWallForGhost(nc, nr)) return false;
    if (map[nr] && map[nr][nc] === 4) return false;
    return true;
  });
  if (opts.length === 0) return { dx: -ghost.dir.dx, dy: -ghost.dir.dy };
  return opts[Math.floor(Math.random() * opts.length)];
}

let scatterChaseTimer = 0;
let scatterPhase = true;
const SCATTER_DURATION = 7000;
const CHASE_DURATION = 20000;

function updateGhosts(dt) {
  // Scatter/chase cycle
  if (powerTimer <= 0) {
    scatterChaseTimer += dt;
    const phase = scatterPhase ? SCATTER_DURATION : CHASE_DURATION;
    if (scatterChaseTimer >= phase) {
      scatterChaseTimer = 0;
      scatterPhase = !scatterPhase;
      ghosts.forEach(g => {
        if (g.mode === 'chase' || g.mode === 'scatter') {
          g.mode = scatterPhase ? 'scatter' : 'chase';
          // Reverse direction on mode change
          g.dir = { dx: -g.dir.dx, dy: -g.dir.dy };
        }
      });
    }
  }

  ghosts.forEach(ghost => {
    // Power timer countdown
    if (ghost.frightenedTimer > 0) {
      ghost.frightenedTimer -= dt;
      if (ghost.frightenedTimer <= 0) {
        ghost.frightenedTimer = 0;
        if (ghost.mode === 'frightened') ghost.mode = scatterPhase ? 'scatter' : 'chase';
      }
    }

    // House release logic
    if (ghost.mode === 'house') {
      ghost.houseTimer -= dt;
      if (ghost.houseTimer <= 0) ghost.mode = 'leaving';
      // Bob up and down inside house
      ghost.y += Math.sin(Date.now() / 300) * 0.4;
      return;
    }

    // Leaving house
    if (ghost.mode === 'leaving') {
      const target = HOUSE_EXIT;
      const tx = target.col * TILE + TILE / 2;
      const ty = target.row * TILE + TILE / 2;
      const dx = tx - ghost.x, dy = ty - ghost.y;
      const dist2 = Math.sqrt(dx*dx+dy*dy);
      if (dist2 < 2) {
        ghost.x = tx; ghost.y = ty;
        ghost.col = target.col; ghost.row = target.row;
        ghost.mode = scatterPhase ? 'scatter' : 'chase';
        ghost.dir = DIR.LEFT;
      } else {
        const spd = GHOST_SPEED * 0.8;
        ghost.x += (dx / dist2) * spd;
        ghost.y += (dy / dist2) * spd;
      }
      return;
    }

    // Eaten - return to house
    if (ghost.mode === 'eaten') {
      const tx = HOUSE_EXIT.col * TILE + TILE / 2;
      const ty = HOUSE_EXIT.row * TILE + TILE / 2;
      const dx = tx - ghost.x, dy = ty - ghost.y;
      const d = Math.sqrt(dx*dx+dy*dy);
      if (d < 3) {
        ghost.x = tx; ghost.y = ty;
        ghost.col = HOUSE_EXIT.col; ghost.row = HOUSE_EXIT.row;
        ghost.mode = 'leaving';
        ghost.frightenedTimer = 0;
      } else {
        const spd = GHOST_EATEN_SPEED;
        ghost.x += (dx / d) * spd;
        ghost.y += (dy / d) * spd;
        ghost.col = Math.floor(ghost.x / TILE);
        ghost.row = Math.floor(ghost.y / TILE);
      }
      return;
    }

    const spd = ghost.mode === 'frightened' ? GHOST_FRIGHTENED_SPEED :
                GHOST_SPEED * (1 + (level - 1) * 0.06);

    // Move toward tile center, then decide next dir
    const centerX = ghost.col * TILE + TILE / 2;
    const centerY = ghost.row * TILE + TILE / 2;
    const distCenter = Math.sqrt((ghost.x - centerX) ** 2 + (ghost.y - centerY) ** 2);

    // Only decide a new direction when arriving at a tile we haven't decided at yet
    if (distCenter < spd + 0.5 && (ghost.col !== ghost.decideCol || ghost.row !== ghost.decideRow)) {
      ghost.x = centerX;
      ghost.y = centerY;
      ghost.decideCol = ghost.col;
      ghost.decideRow = ghost.row;
      const target = ghostTarget(ghost);
      if (ghost.mode === 'frightened') {
        ghost.dir = randomGhostDir(ghost);
      } else if (target) {
        ghost.dir = bestGhostDir(ghost, target);
      }
    }

    // Move
    ghost.x += ghost.dir.dx * spd;
    ghost.y += ghost.dir.dy * spd;

    // Wrap
    if (ghost.x < 0) ghost.x = COLS * TILE;
    if (ghost.x > COLS * TILE) ghost.x = 0;

    ghost.col = Math.floor(ghost.x / TILE);
    ghost.row = Math.floor(ghost.y / TILE);
    if (ghost.col < 0) ghost.col = 0;
    if (ghost.col >= COLS) ghost.col = COLS - 1;
    if (ghost.row < 0) ghost.row = 0;
    if (ghost.row >= ROWS) ghost.row = ROWS - 1;
    ghost.eyeDir = ghost.dir;
  });
}

function checkGhostCollisions() {
  ghosts.forEach(ghost => {
    if (ghost.mode === 'eaten') return;
    const dx = ghost.x - pacman.x, dy = ghost.y - pacman.y;
    if (Math.sqrt(dx*dx+dy*dy) < TILE * 0.75) {
      if (ghost.mode === 'frightened') {
        ghost.mode = 'eaten';
        score += eatGhostScore;
        ghostEatQueue.push({ score: eatGhostScore, x: ghost.x, y: ghost.y, timer: 1200 });
        eatGhostScore = Math.min(eatGhostScore * 2, 1600);
        playEatGhost();
      } else if (gameState === 'playing') {
        // Pac-Man dies
        gameState = 'dying';
        stateTimer = 2500;
        playDeath();
      }
    }
  });
}

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────
function countDots(m) {
  return m.flat().filter(v => v === 0 || v === 2).length;
}

function initGame(fresh = true) {
  map = cloneMap(RAW_MAP);
  if (fresh) { score = 0; lives = 3; level = 1; }
  totalDots = countDots(map);
  pacman = createPacman();
  ghosts = createGhosts();
  powerTimer = 0;
  scatterChaseTimer = 0;
  scatterPhase = true;
  eatGhostScore = 200;
  ghostEatQueue = [];
  sirenTimer = 0;
  gameState = 'ready';
  stateTimer = 2000;
  updateHUD();
}

function updateHUD() {
  scoreDisplay.textContent = score;
  if (score > highScore) { highScore = score; localStorage.setItem('pmhi', highScore); }
  highDisplay.textContent = highScore;
  livesContainer.innerHTML = 'LIVES: ';
  for (let i = 0; i < lives; i++) {
    const cvs = document.createElement('canvas');
    cvs.className = 'life-icon';
    cvs.width = 18; cvs.height = 18;
    const c = cvs.getContext('2d');
    c.fillStyle = '#ffff00';
    c.beginPath();
    c.moveTo(9, 9);
    c.arc(9, 9, 8, 0.4, Math.PI * 2 - 0.4);
    c.closePath();
    c.fill();
    livesContainer.appendChild(cvs);
  }
}

// ─────────────────────────────────────────────
// DRAWING
// ─────────────────────────────────────────────
function drawMaze() {
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const v = map[r][c];
      const x = c * TILE, y = r * TILE;
      if (v === 1) {
        ctx.fillStyle = '#00008b';
        ctx.fillRect(x, y, TILE, TILE);
        // Wall border glow
        ctx.strokeStyle = '#1a1aff';
        ctx.lineWidth = 1.5;
        ctx.strokeRect(x + 0.75, y + 0.75, TILE - 1.5, TILE - 1.5);
      } else if (v === 0) {
        // Dot
        ctx.fillStyle = '#ffb8ae';
        ctx.beginPath();
        ctx.arc(x + TILE/2, y + TILE/2, 2, 0, Math.PI * 2);
        ctx.fill();
      } else if (v === 2) {
        // Power pellet (pulsing)
        const pulse = 0.7 + 0.3 * Math.sin(Date.now() / 200);
        ctx.fillStyle = `rgba(255, 184, 174, ${pulse})`;
        ctx.beginPath();
        ctx.arc(x + TILE/2, y + TILE/2, 5 * pulse, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowColor = '#ffb8ae';
        ctx.shadowBlur = 8;
        ctx.fill();
        ctx.shadowBlur = 0;
      }
    }
  }
}

function drawPacman() {
  if (pacman.dead) {
    // Death animation
    const angle = (pacman.deathFrame / 40) * Math.PI;
    if (angle >= Math.PI) return;
    ctx.fillStyle = '#ffff00';
    ctx.beginPath();
    ctx.moveTo(pacman.x, pacman.y);
    ctx.arc(pacman.x, pacman.y, TILE / 2 - 1, angle, Math.PI * 2 - angle);
    ctx.closePath();
    ctx.fill();
    pacman.deathFrame++;
    return;
  }

  const angle = pacman.mouthAngle * Math.PI;
  // Direction offset for mouth
  let startAngle, endAngle;
  if (pacman.dir === DIR.RIGHT) { startAngle = angle; endAngle = Math.PI * 2 - angle; }
  else if (pacman.dir === DIR.LEFT) { startAngle = Math.PI + angle; endAngle = Math.PI - angle; }
  else if (pacman.dir === DIR.UP) { startAngle = -Math.PI/2 + angle; endAngle = -Math.PI/2 - angle; }
  else { startAngle = Math.PI/2 + angle; endAngle = Math.PI/2 - angle; }

  ctx.fillStyle = '#ffff00';
  ctx.shadowColor = '#ffff00';
  ctx.shadowBlur = 6;
  ctx.beginPath();
  ctx.moveTo(pacman.x, pacman.y);
  ctx.arc(pacman.x, pacman.y, TILE / 2 - 1, startAngle, endAngle);
  ctx.closePath();
  ctx.fill();
  ctx.shadowBlur = 0;
}

function drawGhost(ghost) {
  const x = ghost.x, y = ghost.y;
  const r = TILE / 2 - 1;
  const frightened = ghost.mode === 'frightened';
  const eaten = ghost.mode === 'eaten';
  const flashing = frightened && ghost.frightenedTimer < 2000 && Math.floor(Date.now() / 250) % 2 === 0;

  if (eaten) {
    // Just eyes
    drawGhostEyes(x, y, ghost.eyeDir, '#fff', '#00f');
    return;
  }

  const color = frightened ? (flashing ? '#fff' : '#2121de') : ghost.color;

  ctx.fillStyle = color;
  ctx.shadowColor = color;
  ctx.shadowBlur = 8;

  // Body
  ctx.beginPath();
  ctx.arc(x, y - 1, r, Math.PI, 0, false);
  // Bottom wavy
  const bottom = y + r - 1;
  const left = x - r;
  const waveW = (r * 2) / 3;
  ctx.lineTo(x + r, bottom);
  for (let i = 2; i >= 0; i--) {
    const wx = left + i * waveW + waveW;
    const wx2 = left + i * waveW + waveW / 2;
    const wy = i % 2 === 0 ? bottom - 3 : bottom;
    ctx.quadraticCurveTo(wx2, wy, wx - waveW, bottom);
  }
  ctx.closePath();
  ctx.fill();
  ctx.shadowBlur = 0;

  if (!frightened) drawGhostEyes(x, y, ghost.eyeDir, '#fff', '#00f');
  else {
    // Frightened face
    ctx.fillStyle = flashing ? '#f00' : '#fff';
    ctx.fillRect(x - 6, y - 1, 4, 3);
    ctx.fillRect(x + 2, y - 1, 4, 3);
    ctx.fillStyle = flashing ? '#f00' : '#fff';
    // Mouth
    for (let i = 0; i < 5; i++) {
      ctx.fillRect(x - 6 + i * 3, y + 4 + (i % 2 === 0 ? 0 : 2), 2, 3);
    }
  }
}

function drawGhostEyes(x, y, dir, white, pupil) {
  const offX = dir.dx * 2, offY = dir.dy * 2;
  [-4, 4].forEach(ox => {
    ctx.fillStyle = white;
    ctx.beginPath();
    ctx.ellipse(x + ox, y - 3, 3, 4, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = pupil;
    ctx.beginPath();
    ctx.arc(x + ox + offX, y - 3 + offY, 1.8, 0, Math.PI * 2);
    ctx.fill();
  });
}

function drawScorePopups() {
  ghostEatQueue.forEach(p => {
    const alpha = Math.min(1, p.timer / 400);
    ctx.fillStyle = `rgba(0,255,255,${alpha})`;
    ctx.font = 'bold 12px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(p.score, p.x, p.y - (1200 - p.timer) / 80);
  });
  ctx.textAlign = 'left';
}

function drawReadyMessage() {
  ctx.fillStyle = '#ffff00';
  ctx.font = 'bold 14px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('READY!', canvas.width / 2, 23 * TILE + TILE / 2 + 5);
  ctx.textAlign = 'left';
}

// ─────────────────────────────────────────────
// MAIN LOOP
// ─────────────────────────────────────────────
function showMessage(msg, sub, duration) {
  msgEl.textContent = msg;
  msgEl.style.display = 'block';
  const canvasRect = canvas.getBoundingClientRect();
  msgEl.style.top = (canvasRect.top + canvas.height / 2 - 20) + 'px';
  msgEl.style.left = canvasRect.left + 'px';
  msgEl.style.width = canvas.width + 'px';
  if (sub) {
    subEl.textContent = sub;
    subEl.style.display = 'block';
    subEl.style.top = (canvasRect.top + canvas.height / 2 + 20) + 'px';
    subEl.style.left = canvasRect.left + 'px';
    subEl.style.width = canvas.width + 'px';
  }
}

function hideMessage() {
  msgEl.style.display = 'none';
  subEl.style.display = 'none';
}

function gameLoop(timestamp) {
  const dt = Math.min(timestamp - lastTime, 50);
  lastTime = timestamp;
  frameCount++;

  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  drawMaze();

  // Update score popups
  ghostEatQueue = ghostEatQueue.filter(p => {
    p.timer -= dt;
    return p.timer > 0;
  });
  drawScorePopups();

  if (gameState === 'title') {
    drawTitle();
    requestAnimationFrame(gameLoop);
    return;
  }

  if (gameState === 'ready') {
    ghosts.forEach(drawGhost);
    drawPacman();
    drawReadyMessage();
    stateTimer -= dt;
    if (stateTimer <= 0) { gameState = 'playing'; hideMessage(); }
    requestAnimationFrame(gameLoop);
    return;
  }

  if (gameState === 'playing') {
    sirenTimer += dt;
    if (sirenTimer > 400) { sirenTimer = 0; if (powerTimer <= 0) playSiren(); }
    powerTimer = Math.max(0, powerTimer - dt);
    updatePacman(dt);
    updateGhosts(dt);
    checkGhostCollisions();
    updateHUD();

    if (totalDots <= 0) {
      gameState = 'levelclear';
      stateTimer = 2500;
      playLevelUp();
      showMessage('LEVEL CLEAR!', `LEVEL ${level}`, 2500);
    }
  }

  if (gameState === 'dying') {
    stateTimer -= dt;
    pacman.dead = true;
    ghosts.forEach(drawGhost);
    drawPacman();
    if (stateTimer <= 0) {
      lives--;
      updateHUD();
      if (lives <= 0) {
        gameState = 'gameover';
        stateTimer = 3000;
        showMessage('GAME OVER', 'PRESS SPACE TO RESTART', 3000);
      } else {
        pacman = createPacman();
        ghosts = createGhosts();
        powerTimer = 0;
        gameState = 'ready';
        stateTimer = 2000;
        hideMessage();
      }
    } else {
      requestAnimationFrame(gameLoop);
      return;
    }
  }

  if (gameState === 'levelclear') {
    stateTimer -= dt;
    // Flash maze
    if (Math.floor(stateTimer / 200) % 2 === 0) {
      ctx.fillStyle = 'rgba(255,255,255,0.07)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    }
    if (stateTimer <= 0) {
      level++;
      hideMessage();
      initGame(false);
    }
    requestAnimationFrame(gameLoop);
    return;
  }

  if (gameState === 'gameover') {
    stateTimer -= dt;
    if (stateTimer <= 0 || keys[' ']) {
      hideMessage();
      initGame(true);
    }
    requestAnimationFrame(gameLoop);
    return;
  }

  if (gameState === 'playing' || gameState === 'ready') {
    ghosts.forEach(drawGhost);
    drawPacman();
  }

  requestAnimationFrame(gameLoop);
}

function drawTitle() {
  ctx.fillStyle = '#ffff00';
  ctx.font = 'bold 36px monospace';
  ctx.textAlign = 'center';
  ctx.shadowColor = '#ffff00';
  ctx.shadowBlur = 20;
  ctx.fillText('PAC-MAN', canvas.width / 2, canvas.height / 2 - 60);
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#fff';
  ctx.font = '13px monospace';
  ctx.fillText('PRESS SPACE OR CLICK', canvas.width / 2, canvas.height / 2 + 10);
  ctx.fillStyle = '#aaa';
  ctx.font = '11px monospace';
  ctx.fillText('ARROW KEYS / WASD to move', canvas.width / 2, canvas.height / 2 + 40);
  ctx.textAlign = 'left';
}

// ─────────────────────────────────────────────
// INPUT
// ─────────────────────────────────────────────
const keys = {};
document.addEventListener('keydown', e => {
  keys[e.key] = true;
  ensureAudio();
  if (gameState === 'title') { initGame(true); return; }
  if (gameState === 'gameover' && e.key === ' ') { hideMessage(); initGame(true); return; }
  const dirMap = {
    ArrowUp: DIR.UP, ArrowDown: DIR.DOWN, ArrowLeft: DIR.LEFT, ArrowRight: DIR.RIGHT,
    w: DIR.UP, s: DIR.DOWN, a: DIR.LEFT, d: DIR.RIGHT,
    W: DIR.UP, S: DIR.DOWN, A: DIR.LEFT, D: DIR.RIGHT,
  };
  if (dirMap[e.key]) { pacman.nextDir = dirMap[e.key]; e.preventDefault(); }
});
document.addEventListener('keyup', e => { delete keys[e.key]; });

canvas.addEventListener('click', () => {
  ensureAudio();
  if (gameState === 'title') initGame(true);
});

// Touch / swipe
let touchStart = null;
canvas.addEventListener('touchstart', e => { touchStart = e.touches[0]; ensureAudio(); }, { passive: true });
canvas.addEventListener('touchend', e => {
  if (!touchStart) return;
  const dx = e.changedTouches[0].clientX - touchStart.clientX;
  const dy = e.changedTouches[0].clientY - touchStart.clientY;
  if (Math.abs(dx) > Math.abs(dy)) pacman.nextDir = dx > 0 ? DIR.RIGHT : DIR.LEFT;
  else pacman.nextDir = dy > 0 ? DIR.DOWN : DIR.UP;
  if (gameState === 'title') initGame(true);
  touchStart = null;
}, { passive: true });

// ─────────────────────────────────────────────
// BOOT
// ─────────────────────────────────────────────
highScore = parseInt(localStorage.getItem('pmhi') || '0');
highDisplay.textContent = highScore;
score = 0; lives = 3; level = 1;
map = cloneMap(RAW_MAP);
totalDots = countDots(map);
pacman = createPacman();
ghosts = createGhosts();
powerTimer = 0;
scatterChaseTimer = 0;
scatterPhase = true;
eatGhostScore = 200;
ghostEatQueue = [];
sirenTimer = 0;
gameState = 'title';
updateHUD();

lastTime = performance.now();
requestAnimationFrame(gameLoop);
</script>
</body>
</html>
